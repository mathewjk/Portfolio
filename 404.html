<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Mathew Joseph Kayyalackakom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #f4f3ef;
      --ink: #131211;
      --muted: #6b6a66;
      --line: rgba(19, 18, 17, 0.14);
      --accent: #0d9488;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    html.dark {
      --bg: #0e0e0d;
      --ink: #f4f3ef;
      --muted: #9a998f;
      --line: rgba(244, 243, 239, 0.16);
      --accent: #2dd4bf;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::selection { background: var(--accent); color: #fff; }

    body {
      font-family: "Inter", -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .flow { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .blob {
      position: absolute; top: 0; left: 0;
      width: 46vmax; height: 46vmax; border-radius: 50%;
      filter: blur(64px); opacity: 0.55; mix-blend-mode: multiply; will-change: transform;
    }
    html.dark .blob { mix-blend-mode: screen; opacity: 0.4; }
    .b1 { background: radial-gradient(circle at center, #ffcf98 0%, transparent 60%); }
    .b2 { width: 34vmax; height: 34vmax; background: radial-gradient(circle at center, #a9caff 0%, transparent 60%); }

    .content { position: relative; z-index: 1; }

    .code {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: clamp(90px, 22vw, 220px);
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: var(--accent);
    }

    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 500;
      font-size: clamp(22px, 4vw, 38px);
      letter-spacing: -0.02em;
      margin: 18px 0 34px;
      max-width: 20ch;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      text-decoration: none;
      background: var(--accent);
      border-radius: 999px;
      padding: 15px 28px;
      transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease);
    }
    .home-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px -10px var(--accent); }
    html.dark .home-btn { color: #06231f; }
    .home-btn svg { width: 16px; height: 16px; transition: transform 0.35s var(--ease); }
    .home-btn:hover svg { transform: translateX(-4px); }

    @media (prefers-reduced-motion: reduce) { .flow { display: none; } }
  </style>
</head>
<body>
  <div class="flow" aria-hidden="true">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
  </div>

  <div class="content">
    <div class="code">404</div>
    <h1>This page doesn't exist. Much like my free time.</h1>
    <a class="home-btn" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M11 6l-6 6 6 6" />
      </svg>
      Take me home
    </a>
  </div>

  <script>
    const root = document.documentElement;
    const saved = localStorage.getItem("theme");
    if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
      root.classList.add("dark");
    }

    if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      const blobs = [
        { el: document.querySelector(".b1"), x: 0, y: 0, ease: 0.09 },
        { el: document.querySelector(".b2"), x: 0, y: 0, ease: 0.15 },
      ];
      let mx = window.innerWidth / 2, my = window.innerHeight / 2;
      blobs.forEach((b) => { b.x = mx; b.y = my; });
      window.addEventListener("pointermove", (e) => { mx = e.clientX; my = e.clientY; });
      (function frame() {
        for (const b of blobs) {
          b.x += (mx - b.x) * b.ease;
          b.y += (my - b.y) * b.ease;
          b.el.style.transform = `translate(${b.x}px, ${b.y}px) translate(-50%, -50%)`;
        }
        requestAnimationFrame(frame);
      })();
    }
  </script>
</body>
</html>
